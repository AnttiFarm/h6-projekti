- apt:
    name: ufw
    state: present

- service:
    name: ufw
    enabled: true

- ufw:
    policy: deny
    state: enabled
    logging: on

- ufw:
    rule: allow
    port: '22,80,443'
    proto: tcp

- ufw:
    rule: allow
    port: '68,22,80,443'
    proto: udp

- apt:
    name: fail2ban
    state: present

- service:
    name: fail2ban
    state: started
    enabled: yes
