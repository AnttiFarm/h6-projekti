- apt:
    name: nginx
    state: present
    update_cache: yes

- group:
    name: nginx
    state: present

- group:
    name: web
    state: present

- user:
    name: nginx
    state: present
    group: nginx
    groups: web
    append: yes

- file:
    path: /home/nginx
    state: directory
    owner: "nginx"
    group: "web"
    mode: "0775"

- file:
    path: /home/nginx/publicsite
    state: directory
    owner: "nginx"
    group: "web"
    mode: "2775"

- copy:
    src: "index.html"
    dest: /home/nginx/publicsite
    owner: "nginx"
    group: "web"
    mode: "0664"
    force: false
    
- copy:
    src: "publicsite"
    dest: /etc/nginx/sites-available/publicsite
    owner: "root"
    group: "root"
    mode: "0644"
  notify: restart nginx

- file:
    src: /etc/nginx/sites-available/publicsite
    dest: /etc/nginx/sites-enabled/publicsite
    owner: root
    group: root
    state: link
  notify: restart nginx

- file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: restart nginx

- service:
    name: nginx
    state: started
    enabled: true


